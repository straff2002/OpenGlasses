name: OpenGlasses
options:
  bundleIdPrefix: com.openglasses
  deploymentTarget:
    iOS: "17.0"
    watchOS: "10.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true
  developmentLanguage: en
  knownRegions:
    - en
    - zh-Hans
    - zh-Hant
    - ja
    - ko
    - cs
    - pl
    - pt-BR
    - pt-PT
    - es
    - es-MX
    - fr
    - fr-CA
    - de
    - it
    - nl
    - th
    - ar
    - hi
    - ru
    - sv
    - fi
    - uk
    - el
    - tr
    - da
    - nb
    - ro
    - hu
    - hr
    - sk
    - ms
    - vi
    - id
    - ca

packages:
  meta-wearables-dat-ios:
    url: https://github.com/facebook/meta-wearables-dat-ios.git
    from: "0.3.0"
  HaishinKit:
    url: https://github.com/shogo4405/HaishinKit.swift.git
    from: "2.0.0"
  mlx-swift-lm:
    url: https://github.com/ml-explore/mlx-swift-lm.git
    branch: main

targets:
  OpenGlasses:
    type: application
    platform: iOS
    sources:
      - path: OpenGlasses/Sources
    entitlements:
      path: OpenGlasses/OpenGlasses.entitlements
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.openglasses.app
        MARKETING_VERSION: "1.3.1"
        CURRENT_PROJECT_VERSION: "5"
        SWIFT_VERSION: "5.9"
        CODE_SIGN_ALLOW_ENTITLEMENTS_MODIFICATION: "YES"
        INFOPLIST_FILE: OpenGlasses/Info.plist
        GENERATE_INFOPLIST_FILE: "NO"
        INFOPLIST_KEY_CFBundleDisplayName: "OpenGlasses"
        INFOPLIST_KEY_LSApplicationCategoryType: "public.app-category.utilities"
    dependencies:
      - package: meta-wearables-dat-ios
        product: MWDATCore
      - package: meta-wearables-dat-ios
        product: MWDATCamera
      - package: HaishinKit
        product: HaishinKit
      - package: HaishinKit
        product: RTMPHaishinKit
      - package: mlx-swift-lm
        product: MLXLLM
      - package: mlx-swift-lm
        product: MLXLMCommon
      - package: mlx-swift-lm
        product: MLXVLM
      - target: GlassesActivityWidget
      - target: OpenGlassesWatch

  GlassesActivityWidget:
    type: app-extension
    platform: iOS
    sources:
      - path: GlassesActivityWidget
      - path: OpenGlasses/Sources/Models/GlassesActivityAttributes.swift
    info:
      path: GlassesActivityWidget/Info.plist
      properties:
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.openglasses.app.GlassesActivityWidget
        SWIFT_VERSION: "5.9"
        SKIP_INSTALL: "YES"

  OpenGlassesWatch:
    type: application
    platform: watchOS
    sources:
      - path: OpenGlassesWatch
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.openglasses.app.watchkitapp
        SWIFT_VERSION: "5.9"
        INFOPLIST_FILE: OpenGlassesWatch/Info.plist
        GENERATE_INFOPLIST_FILE: "NO"
        SKIP_INSTALL: "YES"
